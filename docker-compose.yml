services:
  backend:
    build: ./backend
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    networks:
      - app_network
    depends_on:
      pgvector:
        condition: service_healthy
      # chromadb:
      #   condition: service_started
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  frontend:
    build: ./frontend
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app_network

  # chromadb:
  #   image: chromadb/chroma:latest
  #   ports:
  #     - "8001:8000"
  #   volumes:
  #     - chroma_data:/chroma/chroma
  #   networks:
  #     - app_network

  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=ragwebui
      - POSTGRES_USER=ragwebui
      - POSTGRES_PASSWORD=ragwebui
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./infra/sql/pgvector-init.sql:/docker-entrypoint-initdb.d/pgvector-init.sql:ro
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragwebui -d ragwebui"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # For Qdrant, Remove the comment and run the following command to start the service
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   ports:
  #     - "6333:6333" # REST API
  #     - "6334:6334" # GRPC
  #   volumes:
  #     - qdrant_data:/qdrant/storage
  #   environment:
  #     - QDRANT_ALLOW_RECOVERY_MODE=true
  #   networks:
  #     - app_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app_network

volumes:
  # chroma_data:
  pgvector_data:
  # qdrant_data:

networks:
  app_network:
    driver: bridge
